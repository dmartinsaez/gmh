<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análisis y Catálogo - Ópera en el Buen Retiro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Georgia', serif; background-color: #f4f4f4; color: #2b2b2b; line-height: 1.6; padding: 20px; }
        .contenedor { max-width: 1100px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h1, h2 { color: #1f2d3d; text-align: center; }
        h3 { border-bottom: 2px solid #1f6fb2; color: #1f6fb2; padding-bottom: 5px; margin-top: 40px; }
        
        .grid-graficos { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .card-grafico { background: #fff; border: 1px solid #eee; padding: 20px; border-radius: 8px; }
        .full-width { grid-column: 1 / -1; }

        .lista-analitica { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .columna-lista { background: #fdfdfd; border: 1px solid #eee; padding: 15px; border-radius: 8px; font-size: 0.95em; }
        .columna-lista ul { padding-left: 20px; }
        .columna-lista li { margin-bottom: 8px; }
        .tag-año { background: #e9ecef; padding: 2px 6px; border-radius: 4px; font-size: 0.85em; margin-left: 5px; color: #444; }
        
        .seccion-festiva { margin-top: 30px; columns: 2; column-gap: 40px; font-size: 0.9em; }
        .ocasion-item { break-inside: avoid; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px dashed #ccc; }
        .fecha-ocasion { font-weight: bold; color: #1f6fb2; margin-right: 8px; }

        @media (max-width: 768px) { 
            .grid-graficos, .lista-analitica { grid-template-columns: 1fr; } 
            .seccion-festiva { columns: 1; }
        }
    </style>
</head>
<body>

<div class="contenedor">
    <h1>Análisis del Catálogo Operístico (1747–1758)</h1>

    <div class="grid-graficos">
        <div class="card-grafico full-width"><canvas id="chartAnual"></canvas></div>
        <div class="card-grafico full-width"><canvas id="chartMensual"></canvas></div>
    </div>

    <h3>Catálogo de Óperas y Cronología</h3>
    <div id="listaOperas" class="columna-lista" style="width: 100%; box-sizing: border-box;"></div>

    <div class="lista-analitica">
        <div>
            <h3>Compositores</h3>
            <div id="listaCompositores" class="columna-lista"></div>
        </div>
        <div>
            <h3>Libretistas</h3>
            <div id="listaLibretistas" class="columna-lista"></div>
        </div>
    </div>

    <h3>Calendario de Ocasiones Festivas</h3>
    <div id="listaFestiva" class="seccion-festiva"></div>

</div>

<script>
    fetch('archivo.json').then(r => r.json()).then(data => {
        const datosLimpios = prepararDatos(data);
        renderizarGraficos(datosLimpios);
        generarListas(datosLimpios);
    });

    function prepararDatos(data) {
        let uTitulo = "", uLibreto = "", uComp = "";
        return data.map(item => {
            if (item.Título && item.Título.trim() !== "") {
                uTitulo = item.Título.replace(/<\/?[^>]+(>|$)/g, "").trim();
            }
            if (item.Libreto && item.Libreto.trim() !== "") uLibreto = item.Libreto;
            if (item.Compositor && item.Compositor.trim() !== "") uComp = item.Compositor;

            return { 
                ...item, 
                Título: uTitulo, 
                Libreto: uLibreto, 
                Compositor: uComp,
                Mes: extraerMes(item.Día) 
            };
        });
    }

    function extraerMes(s) {
        if (!s) return "Indeterminado";
        const m = s.toLowerCase();
        if (m.includes("en.")) return "Enero"; if (m.includes("feb.")) return "Febrero";
        if (m.includes("mar.")) return "Marzo"; if (m.includes("ab.")) return "Abril";
        if (m.includes("sep.")) return "Septiembre"; if (m.includes("oct.")) return "Octubre";
        if (m.includes("dic.")) return "Diciembre"; return "Otros";
    }

    function generarListas(data) {
        const operas = {}, comp = {}, lib = {}, festivas = [];

        data.forEach(item => {
            // 1. Procesar Óperas y Años
            if (!item.Título.includes("?")) {
                if (!operas[item.Título]) operas[item.Título] = new Set();
                operas[item.Título].add(item.Año);
            }

            // 2. Procesar Compositores (limpiando actos/notas)
            if (item.Compositor && item.Compositor !== "" && !item.Título.includes("?")) {
                const nombres = item.Compositor.split(/,|y/).map(n => n.split('(')[0].trim());
                nombres.forEach(n => {
                    if (!comp[n]) comp[n] = new Set();
                    comp[n].add(item.Título);
                });
            }

            // 3. Procesar Libretistas
            if (item.Libreto && item.Libreto !== "" && !item.Título.includes("?")) {
                const nombres = item.Libreto.split(/,|y/).map(n => n.trim());
                nombres.forEach(n => {
                    if (!lib[n]) lib[n] = new Set();
                    lib[n].add(item.Título);
                });
            }

            // 4. Procesar Festividades
            if (item.Ocasión && item.Ocasión.trim() !== "") {
                festivas.push({ fecha: `${item.Día} ${item.Año}`, evento: item.Ocasión });
            }
        });

        // Renderizar Óperas
        let htmlOperas = "<ul>";
        Object.keys(operas).sort().forEach(o => {
            htmlOperas += `<li><strong>${o}</strong>: ${Array.from(operas[o]).map(a => `<span class="tag-año">${a}</span>`).join('')}</li>`;
        });
        document.getElementById('listaOperas').innerHTML = htmlOperas + "</ul>";

        // Renderizar Compositores
        let htmlComp = "<ul>";
        Object.keys(comp).sort().forEach(c => {
            if(c !== "Desconocido") htmlComp += `<li><strong>${c}</strong>: <em>${Array.from(comp[c]).join(', ')}</em></li>`;
        });
        document.getElementById('listaCompositores').innerHTML = htmlComp + "</ul>";

        // Renderizar Libretistas
        let htmlLib = "<ul>";
        Object.keys(lib).sort().forEach(l => {
            if(l !== "Desconocido") htmlLib += `<li><strong>${l}</strong>: <em>${Array.from(lib[l]).join(', ')}</em></li>`;
        });
        document.getElementById('listaLibretistas').innerHTML = htmlLib + "</ul>";

        // Renderizar Festivas
        document.getElementById('listaFestiva').innerHTML = festivas.map(f => 
            `<div class="ocasion-item"><span class="fecha-ocasion">${f.fecha}:</span> ${f.evento}</div>`
        ).join('');
    }

    function renderizarGraficos(data) {
        const añosLabel = [...new Set(data.map(i => i.Año))].sort();
        const añosData = añosLabel.map(a => data.filter(i => i.Año === a).length);

        new Chart(document.getElementById('chartAnual'), {
            type: 'line',
            data: {
                labels: añosLabel,
                datasets: [{
                    label: 'Funciones anuales',
                    data: añosData,
                    borderColor: '#1f6fb2',
                    backgroundColor: 'rgba(31, 111, 178, 0.1)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: { plugins: { title: { display: true, text: 'Volumen de Actividad por Año' } } }
        });

        const ordenMeses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        const conteoMeses = {};
        data.forEach(i => { conteoMeses[i.Mes] = (conteoMeses[i.Mes] || 0) + 1; });
        
        new Chart(document.getElementById('chartMensual'), {
            type: 'radar',
            data: {
                labels: ordenMeses,
                datasets: [{
                    label: 'Intensidad mensual',
                    data: ordenMeses.map(m => conteoMeses[m] || 0),
                    backgroundColor: 'rgba(212, 160, 23, 0.2)',
                    borderColor: '#d4a017'
                }]
            },
            options: { plugins: { title: { display: true, text: 'Distribución por meses' } } }
        });
    }
</script>
</body>
</html>
