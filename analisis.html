<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análisis Histórico - Óperas de Farinelli</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Georgia', serif; background-color: #f4f4f4; color: #2b2b2b; line-height: 1.6; padding: 20px; }
        .contenedor { max-width: 1100px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h1, h2 { color: #1f2d3d; text-align: center; margin-bottom: 20px; }
        h3 { border-bottom: 2px solid #1f6fb2; color: #1f6fb2; padding-bottom: 5px; margin-top: 40px; text-transform: uppercase; font-size: 1.1em; }
        
        .grid-graficos { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .card-grafico { background: #fff; border: 1px solid #eee; padding: 20px; border-radius: 8px; }
        .full-width { grid-column: 1 / -1; }

        .columna-lista { background: #fdfdfd; border: 1px solid #eee; padding: 15px; border-radius: 8px; font-size: 0.95em; margin-bottom: 20px; }
        .columna-lista ul { padding-left: 20px; list-style-type: none; }
        .columna-lista li { margin-bottom: 8px; border-bottom: 1px solid #f0f0f0; padding-bottom: 4px; }
        
        .tag-año { background: #e9ecef; padding: 1px 5px; border-radius: 4px; font-size: 0.8em; margin-left: 4px; color: #1f6fb2; font-weight: bold; border: 1px solid #d1d9e0; }

        /* Estilos para el Calendario Festivo */
        .calendario-meses { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .mes-bloque { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px; }
        .mes-titulo { background: #1f6fb2; color: white; padding: 5px 10px; border-radius: 4px; font-weight: bold; margin-bottom: 10px; display: block; text-align: center; }
        .evento-festivo { font-size: 0.9em; margin-bottom: 8px; display: flex; flex-direction: column; }
        .evento-nombre { font-weight: 500; color: #333; }
        .evento-años { margin-top: 3px; }

        @media (max-width: 768px) { .grid-graficos { grid-template-columns: 1fr; } .calendario-meses { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="contenedor">
    <h1>Análisis del Catálogo Operístico (1747–1758)</h1>

    <div class="grid-graficos">
        <div class="card-grafico full-width"><canvas id="chartAnual"></canvas></div>
        <div class="card-grafico full-width"><canvas id="chartMensual"></canvas></div>
    </div>

    <h3>Catálogo de Óperas y Años de Representación</h3>
    <div id="listaOperas" class="columna-lista"></div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div>
            <h3>Compositores</h3>
            <div id="listaCompositores" class="columna-lista"></div>
        </div>
        <div>
            <h3>Libretistas</h3>
            <div id="listaLibretistas" class="columna-lista"></div>
        </div>
    </div>

    <h3>Calendario de Ocasiones Festivas (Agrupado por Mes)</h3>
    <div id="calendarioFestivo" class="calendario-meses"></div>
</div>

<script>
    const ORDEN_MESES = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

    fetch('archivo.json').then(r => r.json()).then(data => {
        const datosLimpios = prepararDatos(data);
        renderizarGraficos(datosLimpios);
        generarListas(datosLimpios);
        generarCalendarioFestivo(datosLimpios);
    });

    function prepararDatos(data) {
        let uTitulo = "", uLibreto = "", uComp = "";
        return data.map(item => {
            let tRaw = item.Título ? item.Título.replace(/<\/?[^>]+(>|$)/g, "").trim() : "";
            if (tRaw !== "" && !tRaw.endsWith("...") && !tRaw.includes("?")) {
                uTitulo = tRaw;
            }
            if (item.Libreto && item.Libreto.trim() !== "") uLibreto = item.Libreto;
            if (item.Compositor && item.Compositor.trim() !== "") uComp = item.Compositor;

            return { 
                ...item, 
                TítuloLimpio: (tRaw.endsWith("...") || tRaw === "") ? uTitulo : tRaw,
                LibretoLimpio: uLibreto,
                CompositorLimpio: uComp,
                Mes: extraerMes(item.Día) 
            };
        });
    }

    function extraerMes(s) {
        if (!s) return "Otros";
        const m = s.toLowerCase();
        const mesesMap = { "en.": "Enero", "feb.": "Febrero", "mar.": "Marzo", "ab.": "Abril", "may.": "Mayo", "jun.": "Junio", "jul.": "Julio", "ag.": "Agosto", "sep.": "Septiembre", "oct.": "Octubre", "nov.": "Noviembre", "dic.": "Diciembre" };
        for (let k in mesesMap) { if (m.includes(k)) return mesesMap[k]; }
        return "Otros";
    }

    function generarListas(data) {
        const operas = {}, comp = {}, lib = {};

        data.forEach(item => {
            const titulo = item.TítuloLimpio;
            if (titulo && !titulo.includes("?")) {
                if (!operas[titulo]) operas[titulo] = new Set();
                operas[titulo].add(item.Año);

                const procesar = (str, mapa) => {
                    if (!str) return;
                    str.split(/,|y|\//).map(n => n.split('(')[0].trim()).forEach(n => {
                        if (n.length > 2) {
                            if (!mapa[n]) mapa[n] = new Set();
                            mapa[n].add(titulo);
                        }
                    });
                };
                procesar(item.CompositorLimpio, comp);
                procesar(item.LibretoLimpio, lib);
            }
        });

        const render = (obj, id, isOpera = false) => {
            let h = "<ul>";
            Object.keys(obj).sort().forEach(k => {
                h += `<li><strong>${k}</strong>${isOpera ? '' : ': <em>' + Array.from(obj[k]).join(', ') + '</em>'} ${isOpera ? Array.from(obj[k]).sort().map(a => `<span class="tag-año">${a}</span>`).join('') : ''}</li>`;
            });
            document.getElementById(id).innerHTML = h + "</ul>";
        };

        render(operas, 'listaOperas', true);
        render(comp, 'listaCompositores');
        render(lib, 'listaLibretistas');
    }

    function generarCalendarioFestivo(data) {
        const festivosPorMes = {};
        ORDEN_MESES.forEach(m => festivosPorMes[m] = {});

        data.forEach(item => {
            if (item.Ocasión && item.Ocasión.trim() !== "" && item.Mes !== "Otros") {
                // Normalizar nombre de la ocasión (quitar puntos, exceso de espacios, unificar minúsculas/mayúsculas)
                let nombreOcc = item.Ocasión.replace(/\.$/, "").trim();
                nombreOcc = nombreOcc.charAt(0).toUpperCase() + nombreOcc.slice(1);
                
                if (!festivosPorMes[item.Mes][nombreOcc]) {
                    festivosPorMes[item.Mes][nombreOcc] = new Set();
                }
                festivosPorMes[item.Mes][nombreOcc].add(item.Año);
            }
        });

        let html = "";
        ORDEN_MESES.forEach(mes => {
            const eventos = Object.keys(festivosPorMes[mes]);
            if (eventos.length > 0) {
                html += `<div class="mes-bloque"><span class="mes-titulo">${mes}</span>`;
                eventos.sort().forEach(ev => {
                    const años = Array.from(festivosPorMes[mes][ev]).sort().map(a => `<span class="tag-año">${a}</span>`).join('');
                    html += `<div class="evento-festivo">
                                <span class="evento-nombre">${ev}</span>
                                <div class="evento-años">${años}</div>
                             </div>`;
                });
                html += `</div>`;
            }
        });
        document.getElementById('calendarioFestivo').innerHTML = html;
    }

    function renderizarGraficos(data) {
        const años = [...new Set(data.map(i => i.Año))].sort();
        const conteoAnual = años.map(a => data.filter(i => i.Año === a).length);
        new Chart(document.getElementById('chartAnual'), {
            type: 'line',
            data: { labels: años, datasets: [{ label: 'Funciones anuales', data: conteoAnual, borderColor: '#1f6fb2', tension: 0.3, fill: true, backgroundColor: 'rgba(31,111,178,0.1)' }] }
        });

        const mesesConteo = ORDEN_MESES.map(m => data.filter(i => i.Mes === m).length);
        new Chart(document.getElementById('chartMensual'), {
            type: 'radar',
            data: { labels: ORDEN_MESES, datasets: [{ label: 'Funciones por mes', data: mesesConteo, backgroundColor: 'rgba(212, 160, 23, 0.2)', borderColor: '#d4a017' }] }
        });
    }
</script>
</body>
</html>
