<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análisis Farinelli - Buen Retiro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --azul: #1a3a5a; --oro: #b8860b; --fondo: #fdfaf3; --borde: #dcdde1; }
        body { font-family: 'Georgia', serif; background-color: #f4f1ea; color: #2c3e50; margin: 0; padding: 20px; }
        
        .contenedor { max-width: 1100px; margin: 0 auto; background: var(--fondo); padding: 30px; border-top: 6px solid var(--azul); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { text-align: center; font-size: 1.6em; color: var(--azul); text-transform: uppercase; border-bottom: 2px double var(--oro); padding-bottom: 10px; }
        .seccion-titulo { text-align: center; font-variant: small-caps; color: var(--oro); border-bottom: 1px solid var(--oro); margin: 30px 0 15px 0; padding-bottom: 5px; font-size: 1.2em; }

        /* BLOQUEO DE TAMAÑO PARA EVITAR BUCLE INFINITO */
        .grid-graficos { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .canvas-container { 
            position: relative; 
            height: 300px; /* Altura fija obligatoria */
            width: 100%; 
            background: white; 
            border: 1px solid var(--borde); 
            border-radius: 8px; 
            padding: 10px;
            box-sizing: border-box; /* Importante */
        }
        .full-width { grid-column: 1 / -1; }

        /* Listas y Ficha */
        .lista-compacta { max-width: 800px; margin: 0 auto; background: white; border: 1px solid var(--borde); padding: 10px; border-radius: 8px; max-height: 400px; overflow-y: auto; }
        ul { list-style: none; padding: 0; margin: 0; }
        li.opera-item { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; cursor: pointer; font-size: 0.9em; }
        li.opera-item:hover { background: #fffdf0; }
        .titulo-opera { font-style: italic; font-weight: bold; color: var(--azul); }
        .tag-año { background: var(--azul); color: white; padding: 1px 5px; border-radius: 3px; font-size: 0.7em; margin-left: 3px; font-family: sans-serif; }

        #fichaOpera { display: none; max-width: 800px; margin: 15px auto; background: var(--azul); color: white; padding: 20px; border-radius: 8px; border-left: 5px solid var(--oro); }

        /* Heatmap */
        .heatmap-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
        .heatmap-cell { height: 60px; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.8em; }
        .mes-label { font-weight: bold; text-transform: uppercase; font-size: 0.7em; margin-bottom: 4px; }

        .btn-orden { background: white; border: 1px solid var(--oro); color: var(--oro); padding: 5px 12px; cursor: pointer; font-variant: small-caps; margin: 0 5px; }
        .btn-orden.active { background: var(--azul); color: white; border-color: var(--azul); }

        @media (max-width: 850px) { 
            .grid-graficos { grid-template-columns: 1fr; } 
            .heatmap-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

<div class="contenedor">
    <h1>Análisis Histórico: El Catálogo Farinelli</h1>

    <div class="grid-graficos">
        <div class="canvas-container full-width">
            <canvas id="chartAnual"></canvas>
        </div>
        <div class="canvas-container full-width">
            <h2 class="seccion-titulo" style="margin: 0 0 10px 0; border:none;">Intensidad Mensual (Heatmap)</h2>
            <div class="heatmap-grid" id="heatmap"></div>
        </div>
    </div>

    <h2 class="seccion-titulo">Catálogo de Óperas (Haz clic para detalles)</h2>
    <div style="text-align: center; margin-bottom: 10px;">
        <button class="btn-orden active" id="btn-alfa" onclick="reRenderOperas('alfa')">A-Z</button>
        <button class="btn-orden" id="btn-año" onclick="reRenderOperas('año')">Por Año</button>
    </div>
    <div id="listaOperas" class="lista-compacta"></div>
    <div id="fichaOpera"></div>

    <div class="grid-graficos">
        <div class="lista-compacta" style="height: 300px;">
            <h2 class="seccion-titulo">Compositores</h2>
            <div id="listaCompositores"></div>
        </div>
        <div class="lista-compacta" style="height: 300px;">
            <h2 class="seccion-titulo">Libretistas</h2>
            <div id="listaLibretistas"></div>
        </div>
    </div>
</div>

<script>
    let globalData = { mapOp: {}, mapComp: {}, mapLib: {}, raw: [] };
    const MESES = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
    const HITOS = { 1750: "Boda Infanta Mª Antonia", 1754: "Muerte Carvajal", 1758: "Muerte Bárbara de Braganza" };

    fetch('archivo.json')
        .then(r => r.json())
        .then(data => {
            globalData.raw = data;
            procesarTodo(data);
            renderCharts();
            renderHeatmap();
            reRenderOperas('alfa');
            renderAutores();
        });

    function normalizar(txt) {
        if (!txt) return "";
        return txt.replace(/<\/?[^>]+(>|$)/g, "").replace(/\.\.\./g, "").trim();
    }

    function procesarTodo(data) {
        let uTit = "";
        data.forEach(item => {
            let t = normalizar(item.Título);
            if (item.Título && item.Título.includes("...")) t = uTit;
            else if (t !== "" && !t.includes("?") && !t.includes("“")) uTit = t;

            if (t !== "" && !t.includes("?") && !t.includes("“")) {
                if (!globalData.mapOp[t]) {
                    globalData.mapOp[t] = { 
                        años: new Set(), 
                        funciones: 0, 
                        occasions: new Set(), 
                        comp: item.Compositor || "No consta", 
                        lib: item.Libreto || "No consta" 
                    };
                }
                globalData.mapOp[t].años.add(item.Año);
                globalData.mapOp[t].funciones++;
                if (item.Ocasión) globalData.mapOp[t].occasions.add(item.Ocasión.split('+')[0].trim());

                const reg = (campo, target) => {
                    if (item[campo]) {
                        let aut = item[campo].replace(/\([^\)]+\)/g, "").replace(/ y | , |,/g, " / ").replace(/\s+/g, " ").trim();
                        if (aut && aut !== "") {
                            if (!target[aut]) target[aut] = new Set();
                            target[aut].add(t);
                        }
                    }
                };
                reg('Compositor', globalData.mapComp);
                reg('Libreto', globalData.mapLib);
            }
        });
    }

    function reRenderOperas(criterio) {
        const keys = Object.keys(globalData.mapOp);
        if (criterio === 'alfa') keys.sort();
        else keys.sort((a,b) => Math.min(...globalData.mapOp[a].años) - Math.min(...globalData.mapOp[b].años));
        
        document.getElementById('btn-alfa').classList.toggle('active', criterio==='alfa');
        document.getElementById('btn-año').classList.toggle('active', criterio==='año');

        document.getElementById('listaOperas').innerHTML = "<ul>" + keys.map(k => `
            <li class="opera-item" onclick="mostrarFicha('${k.replace(/'/g, "\\'")}')">
                <span class="titulo-opera">${k}</span>
                <div>${Array.from(globalData.mapOp[k].años).sort().map(a => `<span class="tag-año">${a}</span>`).join('')}</div>
            </li>`).join('') + "</ul>";
    }

    function mostrarFicha(name) {
        const o = globalData.mapOp[name];
        const f = document.getElementById('fichaOpera');
        f.style.display = 'block';
        f.innerHTML = `<h3 style="margin:0 0 10px 0; color:var(--oro); font-style:italic;">${name}</h3>
            <p style="margin:5px 0"><strong>Representaciones:</strong> ${o.funciones} noches | <strong>Años:</strong> ${Array.from(o.años).sort().join(', ')}</p>
            <p style="margin:5px 0"><strong>Música:</strong> ${o.comp} | <strong>Libreto:</strong> ${o.lib}</p>
            <p style="margin:5px 0; font-size:0.85em; opacity:0.9;"><strong>Ocasiones principales:</strong> ${Array.from(o.occasions).slice(0,3).join(', ')}</p>`;
    }

    function renderAutores() {
        const draw = (map, id) => {
            document.getElementById(id).innerHTML = "<ul>" + Object.keys(map).sort().map(k => `
                <li style="display:block; padding:8px; border-bottom:1px solid #eee; font-size:0.85em;">
                <strong>${k}</strong><br><small style="color:var(--azul)"><i>${Array.from(map[k]).join(', ')}</i></small></li>`).join('') + "</ul>";
        };
        draw(globalData.mapComp, 'listaCompositores');
        draw(globalData.mapLib, 'listaLibretistas');
    }

    function detectarMes(s) {
        if (!s) return null;
        const d = { "en.": "Enero", "feb.": "Febrero", "mar.": "Marzo", "ab.": "Abril", "may.": "Mayo", "jun.": "Junio", "jul.": "Julio", "ag.": "Agosto", "sep.": "Septiembre", "oct.": "Octubre", "nov.": "Noviembre", "dic.": "Diciembre" };
        for (let k in d) if (s.toLowerCase().includes(k)) return d[k];
        return null;
    }

    function renderHeatmap() {
        const container = document.getElementById('heatmap');
        MESES.forEach(m => {
            const count = globalData.raw.filter(i => detectarMes(i.Día) === m).length;
            const alpha = Math.min(count / 30, 1);
            container.innerHTML += `<div class="heatmap-cell" style="background:${count>0 ? `rgba(26,58,90,${0.15+alpha})` : '#eee'}; color:${alpha>0.4 ? 'white' : 'var(--azul)'}">
                <span class="mes-label" style="color:${alpha>0.4 ? 'white' : 'var(--azul)'}">${m.slice(0,3)}</span>
                <strong>${count}</strong></div>`;
        });
    }

    function renderCharts() {
        const años = [...new Set(globalData.raw.map(i => i.Año))].sort();
        const ctx = document.getElementById('chartAnual').getContext('2d');
        
        new Chart(ctx, {
            type: 'line',
            data: { 
                labels: años, 
                datasets: [{ 
                    label: 'Funciones totales', 
                    data: años.map(a => globalData.raw.filter(i => i.Año === a).length), 
                    borderColor: '#1a3a5a', 
                    backgroundColor: 'rgba(26,58,90,0.1)', 
                    fill: true, 
                    tension: 0.3,
                    pointRadius: 5,
                    pointHoverRadius: 8
                }] 
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false, // CLAVE PARA EVITAR EL BUCLE
                plugins: { 
                    title: { display: true, text: 'EVOLUCIÓN DE REPRESENTACIONES', font: {size: 14, family: 'Georgia'} },
                    legend: { display: false },
                    tooltip: { 
                        callbacks: { 
                            afterLabel: (c) => HITOS[c.label] ? '✦ ' + HITOS[c.label] : '' 
                        } 
                    }
                },
                scales: { y: { beginAtZero: true } }
            }
        });
    }
</script>
</body>
</html>
