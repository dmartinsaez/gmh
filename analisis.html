<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análisis Estadístico - Ópera Italiana (1747-1758)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --azul-real: #1f3d5a;
            --dorado: #b8860b;
            --gris-suave: #f8f9fa;
            --borde: #dcdde1;
        }

        body { 
            font-family: 'Georgia', serif; 
            background-color: #f4f1ea; 
            color: #2c3e50; 
            line-height: 1.7; 
            margin: 0; 
            padding: 40px 20px; 
        }

        .contenedor { 
            max-width: 1100px; 
            margin: 0 auto; 
            background: white; 
            padding: 50px; 
            border-radius: 4px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-top: 6px solid var(--azul-real);
        }

        h1 { 
            text-align: center; 
            font-size: 2em; 
            color: var(--azul-real); 
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .seccion-titulo {
            text-align: center;
            font-variant: small-caps;
            color: var(--dorado);
            border-bottom: 1px solid var(--dorado);
            margin: 50px 0 30px 0;
            padding-bottom: 10px;
            font-size: 1.5em;
        }

        .grid-graficos { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 30px; 
            margin-bottom: 50px; 
        }

        .card-grafico { 
            background: var(--gris-suave); 
            padding: 25px; 
            border: 1px solid var(--borde);
            border-radius: 8px;
        }

        .full-width { grid-column: 1 / -1; }

        .lista-container {
            background: var(--gris-suave);
            border: 1px solid var(--borde);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        ul { list-style: none; padding: 0; margin: 0; }
        li { 
            padding: 8px 0; 
            border-bottom: 1px solid #e0e0e0; 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start;
        }
        li:last-child { border-bottom: none; }

        .tag-año { 
            background: var(--azul-real); 
            color: white; 
            padding: 2px 8px; 
            border-radius: 3px; 
            font-size: 0.8em; 
            margin-left: 5px;
            font-family: sans-serif;
        }

        .autores-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .mes-bloque {
            margin-bottom: 25px;
        }

        .mes-nombre {
            font-weight: bold;
            color: var(--azul-real);
            display: block;
            border-bottom: 2px solid var(--azul-real);
            margin-bottom: 10px;
        }

        .evento-item {
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        @media (max-width: 850px) {
            .grid-graficos, .autores-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="contenedor">
    <h1>Documentario Farinelli: Análisis de Datos</h1>

    <div class="grid-graficos">
        <div class="card-grafico full-width">
            <h2 class="seccion-titulo" style="margin-top:0">Actividad Operística Anual</h2>
            <canvas id="chartAnual"></canvas>
        </div>
        <div class="card-grafico full-width">
            <h2 class="seccion-titulo">Distribución Estacional (Meses)</h2>
            <canvas id="chartMensual"></canvas>
        </div>
    </div>

    <h2 class="seccion-titulo">Catálogo de Óperas Representadas</h2>
    <div id="listaOperas" class="lista-container"></div>

    <div class="autores-grid">
        <div>
            <h2 class="seccion-titulo">Compositores</h2>
            <div id="listaCompositores" class="lista-container"></div>
        </div>
        <div>
            <h2 class="seccion-titulo">Libretistas</h2>
            <div id="listaLibretistas" class="lista-container"></div>
        </div>
    </div>

    <h2 class="seccion-titulo">Calendario de Ocasiones Festivas</h2>
    <div id="calendarioFestivo" class="lista-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;"></div>
</div>

<script>
    const MESES = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

    fetch('archivo.json').then(r => r.json()).then(data => {
        const datos = procesarFarinelli(data);
        renderCharts(datos);
        renderLists(datos);
    });

    function procesarFarinelli(data) {
        let ultimoTitulo = "";
        const mapOp = {}, mapComp = {}, mapLib = {}, mapFest = {};

        data.forEach(item => {
            // 1. Limpieza de Título y lógica de "..."
            let t = item.Título ? item.Título.replace(/<\/?[^>]+(>|$)/g, "").trim() : "";
            if (t.endsWith("...")) {
                t = ultimoTitulo;
            } else if (t !== "" && !t.includes("“") && !t.includes("?")) {
                ultimoTitulo = t;
            }

            // Ignorar notas de cantidad o dudas para estadísticas de autoría
            const esValido = t !== "" && !t.includes("“") && !t.includes("?");

            if (esValido) {
                // Registro de Óperas y Años
                if (!mapOp[t]) mapOp[t] = new Set();
                mapOp[t].add(item.Año);

                // Registro de Autores (SIN ARRASTRE: solo si el campo tiene texto)
                const extraer = (campo, target) => {
                    if (item[campo] && item[campo].trim() !== "") {
                        item[campo].split(/,|y|\//).forEach(n => {
                            let limpio = n.split('(')[0].trim();
                            if (limpio.length > 2) {
                                if (!target[limpio]) target[limpio] = new Set();
                                target[limpio].add(t);
                            }
                        });
                    }
                };
                extraer('Compositor', mapComp);
                extraer('Libreto', mapLib);
            }

            // 2. Lógica Festiva (Normalización de nombres)
            if (item.Ocasión && item.Ocasión.trim() !== "") {
                const mes = detectarMes(item.Día);
                if (mes) {
                    // Normalizar: "Cumpleaños Rey Dos Sicilias y días sucesivos" -> "Cumpleaños Rey Dos Sicilias"
                    let occ = item.Ocasión.split(" y ")[0].split(".")[0].trim();
                    occ = occ.charAt(0).toUpperCase() + occ.slice(1);
                    
                    if (!mapFest[mes]) mapFest[mes] = {};
                    if (!mapFest[mes][occ]) mapFest[mes][occ] = new Set();
                    mapFest[mes][occ].add(item.Año);
                }
            }
        });

        return { data, mapOp, mapComp, mapLib, mapFest };
    }

    function detectarMes(s) {
        if (!s) return null;
        const m = s.toLowerCase();
        const d = { "en.": "Enero", "feb.": "Febrero", "mar.": "Marzo", "ab.": "Abril", "may.": "Mayo", "jun.": "Junio", "jul.": "Julio", "ag.": "Agosto", "sep.": "Septiembre", "oct.": "Octubre", "nov.": "Noviembre", "dic.": "Diciembre" };
        for (let k in d) if (m.includes(k)) return d[k];
        return null;
    }

    function renderLists({ mapOp, mapComp, mapLib, mapFest }) {
        // Render Óperas
        const opDiv = document.getElementById('listaOperas');
        let htmlOp = "<ul>";
        Object.keys(mapOp).sort().forEach(o => {
            htmlOp += `<li><span>${o}</span> <div>${Array.from(mapOp[o]).sort().map(a => `<span class="tag-año">${a}</span>`).join('')}</div></li>`;
        });
        opDiv.innerHTML = htmlOp + "</ul>";

        // Render Autores
        const renderAut = (map, id) => {
            let h = "<ul>";
            Object.keys(map).sort().forEach(a => {
                h += `<li><div><strong>${a}</strong><br><small style="color:#666">${Array.from(map[a]).join(', ')}</small></div></li>`;
            });
            document.getElementById(id).innerHTML = h + "</ul>";
        };
        renderAut(mapComp, 'listaCompositores');
        renderAut(mapLib, 'listaLibretistas');

        // Render Festivo
        let hFest = "";
        MESES.forEach(m => {
            if (mapFest[m]) {
                hFest += `<div class="mes-bloque"><span class="mes-nombre">${m}</span>`;
                Object.keys(mapFest[m]).sort().forEach(ev => {
                    hFest += `<div class="evento-item">${ev} <br> ${Array.from(mapFest[m][ev]).sort().map(a => `<span class="tag-año" style="background:#d4af37">${a}</span>`).join('')}</div>`;
                });
                hFest += `</div>`;
            }
        });
        document.getElementById('calendarioFestivo').innerHTML = hFest;
    }

    function renderCharts({ data }) {
        // Gráfico Anual
        const años = [...new Set(data.map(i => i.Año))].sort();
        const counts = años.map(a => data.filter(i => i.Año === a).length);
        
        new Chart(document.getElementById('chartAnual'), {
            type: 'line',
            data: { labels: años, datasets: [{ label: 'Funciones', data: counts, borderColor: '#1f3d5a', backgroundColor: 'rgba(31,61,90,0.1)', fill: true, tension: 0.3 }] },
            options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
        });

        // Gráfico Mensual
        const mesCounts = MESES.map(m => {
            return data.filter(i => detectarMes(i.Día) === m).length;
        });

        new Chart(document.getElementById('chartMensual'), {
            type: 'radar',
            data: { labels: MESES, datasets: [{ label: 'Actividad', data: mesCounts, backgroundColor: 'rgba(184,134,11,0.2)', borderColor: '#b8860b', pointBackgroundColor: '#b8860b' }] },
            options: { plugins: { legend: { display: false } } }
        });
    }
</script>

</body>
</html>
