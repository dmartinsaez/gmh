<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas: Ópera Italiana (1747-1758)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --azul: #1a3a5a; --oro: #b8860b; --fondo: #fdfaf3; --borde: #dcdde1; }
        body { font-family: 'Georgia', serif; background-color: #f4f1ea; color: #2c3e50; line-height: 1.7; margin: 0; padding: 20px; }
        
        .contenedor { max-width: 1100px; margin: 0 auto; background: var(--fondo); padding: 40px; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 6px solid var(--azul); }
        
        h1 { text-align: center; font-size: 1.7em; color: var(--azul); margin-bottom: 30px; text-transform: uppercase; border-bottom: 2px double var(--oro); padding-bottom: 15px; }
        .seccion-titulo { text-align: center; font-variant: small-caps; color: var(--oro); border-bottom: 1px solid var(--oro); margin: 40px 0 20px 0; padding-bottom: 8px; font-size: 1.3em; }

        /* Gráficos en dos columnas */
        .grid-graficos { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .card-grafico { background: white; padding: 15px; border: 1px solid var(--borde); border-radius: 8px; height: 350px; }

        /* Catálogo compacto */
        .controles { text-align: center; margin-bottom: 15px; }
        .btn-orden { background: white; border: 1px solid var(--oro); color: var(--oro); padding: 5px 12px; cursor: pointer; font-variant: small-caps; transition: 0.3s; font-size: 0.9em; }
        .btn-orden.active { background: var(--azul); color: white; border-color: var(--azul); }

        .lista-compacta { max-width: 800px; margin: 0 auto 30px auto; background: white; border: 1px solid var(--borde); padding: 15px; border-radius: 8px; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { padding: 8px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        
        .titulo-opera { font-style: italic; font-weight: bold; color: var(--azul); font-size: 0.95em; }
        .tag-año { background: var(--azul); color: white; padding: 1px 6px; border-radius: 3px; font-size: 0.75em; margin-left: 4px; font-family: sans-serif; }

        .autores-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .mes-bloque { margin-bottom: 20px; background: #fff; padding: 12px; border: 1px solid #eee; border-radius: 5px; break-inside: avoid; }
        .mes-nombre { font-weight: bold; color: var(--azul); border-bottom: 2px solid var(--azul); margin-bottom: 10px; text-align: center; text-transform: uppercase; font-size: 0.85em; display: block;}

        @media (max-width: 850px) { 
            .grid-graficos, .autores-grid { grid-template-columns: 1fr; } 
            .card-grafico { height: auto; }
        }
    </style>
</head>
<body>

<div class="contenedor">
    <h1>Análisis del Catálogo Farinelli (1747-1758)</h1>

    <div class="grid-graficos">
        <div class="card-grafico"><canvas id="chartAnual"></canvas></div>
        <div class="card-grafico"><canvas id="chartMensual"></canvas></div>
    </div>

    <h2 class="seccion-titulo">Catálogo de Óperas Representadas</h2>
    <div class="controles">
        <button class="btn-orden active" id="btn-alfa" onclick="reRenderOperas('alfa')">A-Z</button>
        <button class="btn-orden" id="btn-año" onclick="reRenderOperas('año')">Cronología</button>
    </div>
    <div id="listaOperas" class="lista-compacta"></div>

    <div class="autores-grid">
        <div>
            <h2 class="seccion-titulo">Compositores</h2>
            <div id="listaCompositores" class="lista-compacta"></div>
        </div>
        <div>
            <h2 class="seccion-titulo">Libretistas</h2>
            <div id="listaLibretistas" class="lista-compacta"></div>
        </div>
    </div>

    <h2 class="seccion-titulo">Calendario de Ocasiones Festivas</h2>
    <div id="calendarioFestivo" class="lista-compacta" style="max-width:100%; display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; background:none; border:none;"></div>
</div>

<script>
    let globalData = {};
    const MESES = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

    fetch('archivo.json').then(r => r.json()).then(data => {
        globalData = procesarFarinelli(data);
        renderCharts(globalData);
        reRenderOperas('alfa');
        renderAutores(globalData.mapComp, 'listaCompositores');
        renderAutores(globalData.mapLib, 'listaLibretistas');
        renderCalendario(globalData.mapFest);
    });

    function normalizarFestividad(str) {
        if (!str) return [];
        const excluir = ["lunes", "martes", "miércoles", "miercoles", "jueves", "viernes", "sábado", "sabado", "domingo", "se repitió", "se repitio", "continuación"];
        let partes = str.split(/\s*\+\s*|,\s*/);
        return partes.map(p => {
            let s = p.trim();
            if (excluir.some(pal => s.toLowerCase().includes(pal)) || s.includes("“")) return null;
            let sLimpia = s.replace(/^(la |el |fiesta |festividad |celebración |día |del |de |en |los |las |de la |de los |nuestra |nuestro )+/gi, "").replace(/\.$/, "");
            const low = sLimpia.toLowerCase();
            if (low.includes("circuncisión") || low.includes("circuncision")) return "Circuncisión del Señor";
            if (low.includes("adoración") || low.includes("adoracion") || low.includes("reyes")) return "Adoración de los Reyes";
            if (low.includes("bárbara") || low.includes("barbara")) return "Santo y Cumpleaños de la Reina Bárbara";
            if (low.includes("dos sicilias")) return "Cumpleaños del Rey de las Dos Sicilias";
            if (low.includes("portugal")) return "Cumpleaños de la Reina de Portugal (Mariana Victoria de Borbón y Farnesio)";
            if (low.includes("dulcísimo nombre") || low.includes("dulcisimo nombre")) return "Dulcísimo Nombre de Jesús";
            if (low.includes("purificación") || low.includes("purificacion")) return "Purificación de Nuestra Señora";
            if (low.includes("expectación") || low.includes("expectacion")) return "Expectación de Nuestra Señora";
            if (low.includes("navidad") || low.includes("natividad")) return "Navidad";
            if (low.includes("pascua")) return "Pascua de Resurrección";
            if (low.includes("carnaval") || low.includes("carnestolendas")) return "Carnaval";
            return sLimpia.charAt(0).toUpperCase() + sLimpia.slice(1);
        }).filter(p => p !== null && p.length > 2);
    }

    function normalizarTitulo(titulo) {
        if (!titulo) return [];
        let limpio = titulo.replace(/<\/?[^>]+(>|$)/g, "").replace(/\.\.\./g, "").trim();
        // ELIMINAR INTERROGANTES Y NOTAS
        if (limpio.includes("?") || limpio.includes("“") || limpio === "") return [];
        return limpio.split(/ o |\/| y /).map(p => {
            let s = p.trim().replace(/^(La |El |L'|Las |Los )/i, "");
            if (s.toLowerCase().includes("niteti")) s = "Nitteti";
            if (s.toLowerCase().includes("artaxer")) s = "Artaserse";
            return s.charAt(0).toUpperCase() + s.slice(1);
        }).filter(p => p.length > 2);
    }

    function normalizarAutor(a) {
        if (!a) return "";
        // Limpiar actos y unificar separadores a " / "
        return a.replace(/\([^\)]+\)/g, "")
                .replace(/ , |, | y |\/| ,/g, " / ")
                .replace(/\s+/g, " ")
                .trim();
    }

    function procesarFarinelli(data) {
        let uTit = [];
        const mapOp = {}, mapComp = {}, mapLib = {}, mapFest = {};
        data.forEach(item => {
            let tFila = normalizarTitulo(item.Título);
            if (item.Título && item.Título.includes("...")) tFila = uTit; else if (tFila.length > 0) uTit = tFila;

            tFila.forEach(t => {
                if (!mapOp[t]) mapOp[t] = new Set();
                mapOp[t].add(item.Año);
                const regAut = (campo, target) => {
                    let a = item[campo];
                    if (a && a.trim() !== "") {
                        let aut = normalizarAutor(a);
                        if (!target[aut]) target[aut] = new Set();
                        target[aut].add(t);
                    }
                };
                regAut('Compositor', mapComp);
                regAut('Libreto', mapLib);
            });

            const m = detectarMes(item.Día);
            if (m && item.Ocasión) {
                normalizarFestividad(item.Ocasión).forEach(occ => {
                    if (!mapFest[m]) mapFest[m] = {};
                    if (!mapFest[m][occ]) mapFest[m][occ] = new Set();
                    mapFest[m][occ].add(item.Año);
                });
            }
        });
        return { mapOp, mapComp, mapLib, mapFest, data };
    }

    function reRenderOperas(criterio) {
        const div = document.getElementById('listaOperas');
        document.getElementById('btn-alfa').classList.toggle('active', criterio === 'alfa');
        document.getElementById('btn-año').classList.toggle('active', criterio === 'año');
        let keys = Object.keys(globalData.mapOp);
        if (criterio === 'alfa') keys.sort();
        else keys.sort((a, b) => Math.min(...globalData.mapOp[a]) - Math.min(...globalData.mapOp[b]));
        let h = "<ul>";
        keys.forEach(k => {
            h += `<li><span class="titulo-opera">${k}</span> <div>${Array.from(globalData.mapOp[k]).sort().map(a => `<span class="tag-año">${a}</span>`).join('')}</div></li>`;
        });
        div.innerHTML = h + "</ul>";
    }

    function renderAutores(map, id) {
        let h = "<ul>";
        Object.keys(map).sort().forEach(k => {
            const obras = Array.from(map[k]).map(t => `<i>${t}</i>`).join(', ');
            h += `<li><span style="font-size:0.9em;"><strong>${k}</strong><br><small style="color:#666">Obras: ${obras}</small></span></li>`;
        });
        document.getElementById(id).innerHTML = h + "</ul>";
    }

    function renderCalendario(map) {
        let h = "";
        MESES.forEach(m => {
            if (map[m]) {
                h += `<div class="mes-bloque"><span class="mes-nombre">${m}</span>`;
                Object.keys(map[m]).sort().forEach(ev => {
                    h += `<div style="font-size:0.8em; margin-bottom:8px;"><strong>${ev}</strong><br>${Array.from(map[m][ev]).sort().map(a => `<span class="tag-año" style="background:#d4af37;color:black;padding:0 4px;">${a}</span>`).join('')}</div>`;
                });
                h += `</div>`;
            }
        });
        document.getElementById('calendarioFestivo').innerHTML = h;
    }

    function detectarMes(s) {
        if (!s) return null;
        const d = { "en.": "Enero", "feb.": "Febrero", "mar.": "Marzo", "ab.": "Abril", "may.": "Mayo", "jun.": "Junio", "jul.": "Julio", "ag.": "Agosto", "sep.": "Septiembre", "oct.": "Octubre", "nov.": "Noviembre", "dic.": "Diciembre" };
        for (let k in d) if (s.toLowerCase().includes(k)) return d[k];
        return null;
    }

    function renderCharts(d) {
        const config = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } };
        new Chart(document.getElementById('chartAnual'), {
            type: 'line',
            data: { labels: [...new Set(d.data.map(i => i.Año))].sort(), datasets: [{ label: 'Funciones', data: [...new Set(d.data.map(i => i.Año))].sort().map(a => d.data.filter(i => i.Año === a).length), borderColor: '#1a3a5a', fill: true, backgroundColor: 'rgba(26,58,90,0.05)' }] },
            options: { ...config, plugins: { title: { display: true, text: 'Representaciones por Año' } } }
        });
        new Chart(document.getElementById('chartMensual'), {
            type: 'radar',
            data: { labels: MESES, datasets: [{ data: MESES.map(m => d.data.filter(i => detectarMes(i.Día) === m).length), borderColor: '#b8860b', backgroundColor: 'rgba(184,134,11,0.1)' }] },
            options: { ...config, plugins: { title: { display: true, text: 'Distribución Mensual' } } }
        });
    }
</script>
</body>
</html>
