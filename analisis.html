<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas y análisis - Documentario de prensa 'Farinelli'</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --azul: #1a3a5a; --oro: #b8860b; --fondo: #fdfaf3; --borde: #dcdde1; }
        body { font-family: 'Georgia', serif; background-color: #f4f1ea; color: #2c3e50; margin: 0; padding: 20px; }
        .contenedor { max-width: 1100px; margin: 0 auto; background: var(--fondo); padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { color: var(--azul); font-size: 1.3em; text-align: center; line-height: 1.4; border-bottom: 2px double var(--oro); padding-bottom: 15px; margin-bottom: 30px; }
        
        .nav-farinelli { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .nav-farinelli a { text-decoration: none; color: var(--azul); font-weight: bold; padding: 5px 10px; border: 1px solid transparent; }
        .nav-farinelli .active { border: 1px solid var(--azul); background: var(--azul); color: white !important; border-radius: 4px; }
        
        .seccion-titulo { text-align: center; font-variant: small-caps; color: var(--oro); border-bottom: 1px solid var(--oro); margin: 30px 0 15px 0; padding-bottom: 5px; font-size: 1.2em; }
        
        /* HEATMAP */
        .calendar-heatmap { background: white; padding: 20px; border: 1px solid var(--borde); border-radius: 8px; overflow-x: auto; margin-bottom: 10px; }
        .heatmap-month-row { display: grid; grid-template-columns: 80px repeat(31, 1fr); gap: 2px; align-items: center; margin-bottom: 4px; }
        .heatmap-month-name { font-size: 0.7em; font-weight: bold; color: var(--azul); text-transform: uppercase; }
        .day-cell { height: 18px; background: #f0f0f0; border-radius: 1px; cursor: pointer; transition: 0.2s; }
        #infoDia { display: none; background: var(--azul); color: white; padding: 15px; border-radius: 8px; margin: 10px auto 30px; text-align: center; border-left: 5px solid var(--oro); }

        /* TABLA INVENTARIO UNIVERSAL */
        .tabla-operas { max-width: 1000px; margin: 0 auto; background: white; border: 1px solid var(--borde); border-radius: 8px; overflow: hidden; }
        .fila-header { 
            display: grid; 
            grid-template-columns: 90px 1.5fr 1fr 130px; 
            background: #f1f2f6; 
            padding: 12px 15px; 
            font-weight: bold; 
            font-size: 0.85em; 
            text-transform: uppercase; 
            color: var(--azul);
            border-bottom: 2px solid var(--oro);
        }
        .scroll-area { max-height: 600px; overflow-y: auto; }
        .opera-row { 
            display: grid; 
            grid-template-columns: 90px 1.5fr 1fr 130px; 
            padding: 12px 15px; 
            border-bottom: 1px solid #eee; 
            align-items: center;
            cursor: pointer;
        }
        .opera-row:hover { background: #fdfaf3; }
        .txt-estreno { font-weight: bold; color: var(--azul); font-family: sans-serif; }
        .titulo-opera { font-style: italic; font-weight: bold; color: var(--azul); font-size: 1.05em; }
        .txt-repos { color: #666; font-size: 0.85em; font-family: sans-serif; }
        .txt-noches { text-align: right; font-family: sans-serif; font-size: 0.85em; color: #333; }
        .opera-detalle { display: none; padding: 15px; background: #f9f6ef; border-bottom: 2px solid var(--oro); font-size: 0.9em; line-height: 1.6; grid-column: 1 / span 4; }

        .btn-orden { background: white; border: 1px solid var(--oro); color: var(--oro); padding: 5px 12px; cursor: pointer; font-variant: small-caps; margin: 0 5px; }
        .btn-orden.active { background: var(--azul); color: white; border-color: var(--azul); }
    </style>
</head>
<body>

<div class="contenedor">
    <h1>Documentario de prensa y estadísticas: Ópera Italiana (1747–1758)</h1>

    <nav class="nav-farinelli">
        <a href="index.html">Documentario</a>
        <a href="analisis.html" class="active">Análisis del calendario</a>
    </nav>

    <div style="height: 320px; background:white; border:1px solid var(--borde); border-radius:8px; padding:15px; margin-bottom:30px;">
        <canvas id="chartAnual"></canvas>
    </div>

    <h2 class="seccion-titulo">Actividad diaria (Mapa de Calor)</h2>
    <div class="calendar-heatmap" id="calendarHeatmap"></div>
    <div id="infoDia"></div>

    <h2 class="seccion-titulo">Inventario Crítico de Óperas</h2>
    <div style="text-align: center; margin-bottom: 20px;">
        <button class="btn-orden active" id="btn-año" onclick="reRenderOperas('año')">Por Estreno</button>
        <button class="btn-orden" id="btn-alfa" onclick="reRenderOperas('alfa')">Alfabético</button>
    </div>
    
    <div class="tabla-operas">
        <div class="fila-header">
            <span>Estreno</span>
            <span>Título</span>
            <span>Reposiciones</span>
            <span style="text-align: right;">Noches</span>
        </div>
        <div id="listaOperas" class="scroll-area"></div>
    </div>

    <div id="calendarioFestivo" style="display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-top:50px;"></div>
</div>

<script>
    let globalData = { mapOp: {}, raw: [], dayStats: {}, meta: {} };
    const MESES = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

    fetch('archivo.json').then(r => r.json()).then(data => {
        globalData.raw = data;
        procesarTodo(data);
        renderCharts();
        renderCalendarHeatmap();
        reRenderOperas('año');
        renderCalendarioFinal();
    });

    function cleanTitle(t) {
        if (!t) return "";
        return t.replace(/<\/?[^>]+(>|$)/g, "").replace(/\.\.\./g, "").replace(/[¿?]/g, "").trim();
    }

    function procesarTodo(data) {
        let lastKnownFullTitle = "";
        let canonicalKeys = []; // Para buscar coincidencias parciales

        data.forEach(item => {
            const diaRaw = item['Día'] || "";
            const ocRaw = item['Ocasión'] || "";
            const m = detectarMes(diaRaw);
            const d = diaRaw ? parseInt(diaRaw.match(/\d+/)) : null;

            // 1. LÓGICA DE CALENDARIO (SIEMPRE CUENTA)
            if (m && d) {
                const key = `${m}-${d}`;
                if (!globalData.dayStats[key]) globalData.dayStats[key] = { count: 0, occasions: {} };
                globalData.dayStats[key].count++;
                if (ocRaw) ocRaw.split('+').forEach(o => {
                    let txt = o.trim();
                    if (txt.length > 3 && !txt.includes("“")) 
                        globalData.dayStats[key].occasions[txt] = (globalData.dayStats[key].occasions[txt] || 0) + 1;
                });
            }

            // 2. LÓGICA DE INVENTARIO (SISTEMA DE ASOCIACIÓN UNIVERSAL)
            if (item.Título) {
                let rawT = item.Título.trim();
                
                // Filtro anti-ruido (ignora si empieza por número o es comentario)
                if (/^\d/.test(rawT) || rawT.toLowerCase().includes("óperas") || rawT.startsWith("“")) return;

                // Manejo de herencia ("...")
                let tProcesado = rawT.includes("...") ? lastKnownFullTitle : rawT;
                if (!rawT.includes("...") && !rawT.startsWith("“")) lastKnownFullTitle = rawT;

                // DIVISIÓN DE TÍTULOS COMBINADOS (Adriano o Nitteti)
                let fragmentos = tProcesado.split(/, | y | o /i);

                fragmentos.forEach(frag => {
                    let esDudosa = frag.includes("?") || rawT.includes("?");
                    let tLimpio = cleanTitle(frag);
                    if (tLimpio.length < 3) return;

                    // BUSCADOR DE TÍTULO CANÓNICO
                    // Si el título limpio es una versión corta de uno ya registrado, o viceversa, los une.
                    let finalKey = tLimpio;
                    let existing = Object.keys(globalData.mapOp).find(k => 
                        k.toLowerCase().startsWith(tLimpio.toLowerCase()) || 
                        tLimpio.toLowerCase().startsWith(k.toLowerCase())
                    );
                    
                    // Excepción: Semiramide vs Semiramide riconosciuta (las unimos porque es la misma)
                    if (existing) finalKey = existing;

                    if (!globalData.mapOp[finalKey]) {
                        globalData.mapOp[finalKey] = { años: new Set(), seguras: 0, totales: 0, occasions: new Set(), comp: "", lib: "" };
                    }

                    let op = globalData.mapOp[finalKey];
                    op.totales++;
                    if (!esDudosa) op.seguras++;
                    op.años.add(item.Año);
                    
                    // Guardar metadatos solo si la fila los trae
                    if (item.Compositor && item.Compositor.length > 3 && !item.Compositor.includes("...")) op.comp = item.Compositor;
                    if (item.Libreto && item.Libreto.length > 3 && !item.Libreto.includes("...")) op.lib = item.Libreto;

                    if (ocRaw) ocRaw.split('+').forEach(o => {
                        let txt = o.trim();
                        if (txt.length > 3 && !txt.includes("“")) op.occasions.add(txt);
                    });
                });
            }
        });
    }

    function reRenderOperas(criterio) {
        const keys = Object.keys(globalData.mapOp);
        if (criterio === 'alfa') keys.sort();
        else keys.sort((a,b) => Math.min(...globalData.mapOp[a].años) - Math.min(...globalData.mapOp[b].años));

        document.getElementById('listaOperas').innerHTML = keys.map((k, i) => {
            const op = globalData.mapOp[k];
            const años = Array.from(op.años).sort();
            const estreno = años[0];
            const repos = años.slice(1).join(', ');
            const noches = op.seguras === op.totales ? op.totales : `entre ${op.seguras} y ${op.totales}`;

            return `
            <div class="opera-row" onclick="toggleDetalle(${i})">
                <span class="txt-estreno">${estreno}</span>
                <span class="titulo-opera">${k}</span>
                <span class="txt-repos">${repos || "—"}</span>
                <span class="txt-noches">${noches}</span>
                <div class="opera-detalle" id="det-${i}">
                    <strong>Compositor:</strong> ${op.comp || "Información en proceso de archivo"}<br>
                    <strong>Libretista:</strong> ${op.lib || "Información en proceso de archivo"}<br>
                    <strong>Ocasiones festivas:</strong> ${Array.from(op.occasions).join(', ') || "Funciones ordinarias"}
                </div>
            </div>`;
        }).join('');
    }

    function toggleDetalle(id) {
        const el = document.getElementById('det-' + id);
        const isV = el.style.display === 'block';
        document.querySelectorAll('.opera-detalle').forEach(d => d.style.display = 'none');
        el.style.display = isV ? 'none' : 'block';
    }

    function detectarMes(s) {
        if (!s) return null;
        const d = { "en.": "Enero", "feb.": "Febrero", "mar.": "Marzo", "ab.": "Abril", "may.": "Mayo", "jun.": "Junio", "jul.": "Julio", "ag.": "Agosto", "sep": "Septiembre", "oct.": "Octubre", "nov.": "Noviembre", "dic.": "Diciembre" };
        for (let k in d) if (s.toLowerCase().includes(k)) return d[k];
        return null;
    }

    function renderCalendarHeatmap() {
        const container = document.getElementById('calendarHeatmap'); container.innerHTML = "";
        MESES.forEach(m => {
            let row = `<div class="heatmap-month-row"><div class="heatmap-month-name">${m}</div>`;
            for (let d = 1; d <= 31; d++) {
                const stat = globalData.dayStats[`${m}-${d}`];
                const count = stat ? stat.count : 0;
                const alpha = Math.min(count / 10, 1);
                const color = count > 0 ? `rgba(26, 58, 90, ${0.15 + alpha})` : '#f0f0f0';
                row += `<div class="day-cell" style="background:${color}" onclick="verDetalleDia('${m}', ${d})"></div>`;
            }
            container.innerHTML += row + `</div>`;
        });
    }

    function verDetalleDia(m, d) {
        const stat = globalData.dayStats[`${m}-${d}`];
        const infoDiv = document.getElementById('infoDia'); infoDiv.style.display = 'block';
        if (!stat || stat.count === 0) { infoDiv.innerHTML = `<strong>${d} de ${m}:</strong> Sin registros.`; return; }
        let topOcc = "Función ordinaria"; let max = 0;
        for (let o in stat.occasions) { if (stat.occasions[o] > max) { max = stat.occasions[o]; topOcc = o; } }
        infoDiv.innerHTML = `<strong>${d} de ${m}:</strong> ${stat.count} registros históricos.<br><span style="color:var(--oro); font-variant: small-caps;">Causa frecuente:</span> ${topOcc}`;
    }

    function renderCharts() {
        const años = [...new Set(globalData.raw.map(i => i.Año))].sort();
        new Chart(document.getElementById('chartAnual').getContext('2d'), {
            type: 'line',
            data: { labels: años, datasets: [{ label: 'Actividad Total (Funciones)', data: años.map(a => globalData.raw.filter(i => i.Año === a).length), borderColor: '#1a3a5a', backgroundColor: 'rgba(26,58,90,0.1)', fill: true, tension: 0.3 }] },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    function renderCalendarioFinal() {
        let h = "";
        MESES.forEach(m => {
            let occInMonth = {};
            globalData.raw.forEach(item => {
                if (detectarMes(item['Día']) === m && item['Ocasión'] && item['Ocasión'].length > 5 && !item['Ocasión'].includes("“")) {
                    item['Ocasión'].split('+').forEach(o => {
                        let txt = o.trim(); if (!occInMonth[txt]) occInMonth[txt] = new Set();
                        occInMonth[txt].add(item.Año);
                    });
                }
            });
            if (Object.keys(occInMonth).length > 0) {
                h += `<div style="background:white; padding:15px; border:1px solid var(--borde); border-radius:8px; width:220px;"><span style="font-weight:bold; color:var(--azul); border-bottom:2px solid var(--azul); display:block; text-align:center; margin-bottom:10px; text-transform:uppercase; font-size:0.85em;">${m}</span>`;
                for (let ev in occInMonth) {
                    h += `<div style="font-size:0.75em; margin-bottom:8px;"><strong>${ev}</strong><br>${Array.from(occInMonth[ev]).sort().map(a => `<span style="background:#d4af37;color:black;padding:1px 4px;border-radius:3px;margin-right:2px;">${a}</span>`).join('')}</div>`;
                }
                h += `</div>`;
            }
        });
        document.getElementById('calendarioFestivo').innerHTML = h;
    }
</script>
</body>
</html>
