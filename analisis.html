<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análisis Avanzado - Ópera Italiana (1747-1758)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --azul: #1a3a5a; --oro: #b8860b; --fondo: #fdfaf3; --borde: #dcdde1; --accent: #d4af37; }
        body { font-family: 'Georgia', serif; background-color: #f4f1ea; color: #2c3e50; line-height: 1.7; margin: 0; padding: 20px; }
        .contenedor { max-width: 1200px; margin: 0 auto; background: var(--fondo); padding: 40px; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 6px solid var(--azul); }
        
        h1 { text-align: center; font-size: 1.8em; color: var(--azul); margin-bottom: 30px; text-transform: uppercase; border-bottom: 2px double var(--oro); padding-bottom: 15px; }
        .seccion-titulo { text-align: center; font-variant: small-caps; color: var(--oro); border-bottom: 1px solid var(--oro); margin: 40px 0 20px 0; padding-bottom: 8px; font-size: 1.3em; }

        /* Gráficos */
        .grid-graficos { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .card-grafico { background: white; padding: 20px; border: 1px solid var(--borde); border-radius: 8px; min-height: 350px; position: relative; }
        .full-width { grid-column: 1 / -1; }

        /* Catálogo e Interactividad */
        .lista-compacta { max-width: 900px; margin: 0 auto 30px auto; background: white; border: 1px solid var(--borde); padding: 15px; border-radius: 8px; }
        ul { list-style: none; padding: 0; margin: 0; }
        li.opera-item { padding: 8px 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        li.opera-item:hover { background: #fffdf0; border-left: 4px solid var(--oro); }
        
        .titulo-opera { font-style: italic; font-weight: bold; color: var(--azul); }
        .tag-año { background: var(--azul); color: white; padding: 1px 6px; border-radius: 3px; font-size: 0.75em; margin-left: 4px; font-family: sans-serif; }

        /* Ficha de Ópera */
        #fichaOpera { display: none; max-width: 900px; margin: -20px auto 30px auto; background: var(--azul); color: white; padding: 20px; border-radius: 0 0 8px 8px; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Heatmap Estacional */
        .heatmap-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 5px; margin-top: 10px; }
        .heatmap-cell { height: 40px; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 0.7em; color: white; font-family: sans-serif; }
        .mes-label { text-align: center; font-size: 0.75em; font-weight: bold; margin-bottom: 5px; color: var(--azul); text-transform: uppercase; }

        .controles { text-align: center; margin-bottom: 15px; }
        .btn-orden { background: white; border: 1px solid var(--oro); color: var(--oro); padding: 5px 12px; cursor: pointer; font-variant: small-caps; }
        .btn-orden.active { background: var(--azul); color: white; border-color: var(--azul); }

        @media (max-width: 850px) { .grid-graficos { grid-template-columns: 1fr; } .heatmap-grid { grid-template-columns: repeat(4, 1fr); } }
    </style>
</head>
<body>

<div class="contenedor">
    <h1>Análisis Histórico del Catálogo Farinelli</h1>

    <div class="grid-graficos">
        <div class="card-grafico full-width">
            <h2 class="seccion-titulo" style="margin-top:0">Intensidad Anual e Hitos de la Corte</h2>
            <canvas id="chartAnual"></canvas>
        </div>
        
        <div class="card-grafico full-width" style="min-height: 200px;">
            <h2 class="seccion-titulo">Mapa de Calor: Concentración de Funciones</h2>
            <div id="heatmapContainer">
                <div class="heatmap-grid" id="heatmap"></div>
            </div>
        </div>
    </div>

    <h2 class="seccion-titulo">Inventario de Óperas (Haz clic para ver detalles)</h2>
    <div class="controles">
        <button class="btn-orden active" id="btn-alfa" onclick="reRenderOperas('alfa')">Orden Alfabético</button>
        <button class="btn-orden" id="btn-año" onclick="reRenderOperas('año')">Orden Cronológico</button>
    </div>
    <div id="listaOperas" class="lista-compacta"></div>
    <div id="fichaOpera"></div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div><h2 class="seccion-titulo">Compositores / Colaboraciones</h2><div id="listaCompositores" class="lista-compacta"></div></div>
        <div><h2 class="seccion-titulo">Libretistas / Colaboraciones</h2><div id="listaLibretistas" class="lista-compacta"></div></div>
    </div>
</div>

<script>
    let globalData = {};
    const MESES = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
    
    // Hitos para el punto 5
    const HITOS = {
        1746: "Ascenso Fernando VI",
        1750: "Boda Infanta Mª Antonia",
        1754: "Muerte de Carvajal",
        1758: "Muerte de Bárbara de Braganza"
    };

    fetch('archivo.json').then(r => r.json()).then(data => {
        globalData = procesarDatos(data);
        renderCharts(globalData);
        renderHeatmap(globalData);
        reRenderOperas('alfa');
        renderAutores(globalData.mapComp, 'listaCompositores');
        renderAutores(globalData.mapLib, 'listaLibretistas');
    });

    function procesarDatos(data) {
        let uTit = [];
        const mapOp = {}, mapComp = {}, mapLib = {}, stats = {};
        
        data.forEach(item => {
            let tFila = normalizarTitulo(item.Título);
            if (item.Título && item.Título.includes("...")) tFila = uTit; else if (tFila.length > 0) uTit = tFila;

            tFila.forEach(t => {
                if (!mapOp[t]) mapOp[t] = { años: new Set(), funciones: 0, ocasiones: new Set(), equipo: "" };
                mapOp[t].años.add(item.Año);
                mapOp[t].funciones++;
                if (item.Ocasión) mapOp[t].ocasiones.add(item.Ocasión.split('+')[0].trim());
                
                const reg = (campo, target) => {
                    if (item[campo] && item[campo].trim() !== "") {
                        let aut = item[campo].replace(/\([^\)]+\)/g, "").replace(/ y /g, " / ").trim();
                        if (!target[aut]) target[aut] = new Set();
                        target[aut].add(t);
                        if (campo === 'Compositor') mapOp[t].equipo = aut;
                    }
                };
                reg('Compositor', mapComp); reg('Libreto', mapLib);
            });
        });
        return { mapOp, mapComp, mapLib, data };
    }

    function normalizarTitulo(titulo) {
        if (!titulo) return [];
        let limpio = titulo.replace(/<\/?[^>]+(>|$)/g, "").replace(/\.\.\./g, "").trim();
        if (limpio.includes("?") || limpio.includes("“") || limpio === "") return [];
        return limpio.split(/ o |\/| y /).map(p => p.trim().replace(/^(La |El |L'|Las |Los )/i, "")).filter(p => p.length > 2);
    }

    // --- 1. RENDER HEATMAP ---
    function renderHeatmap(d) {
        const container = document.getElementById('heatmap');
        MESES.forEach((m, idx) => {
            const count = d.data.filter(i => detectarMes(i.Día) === m).length;
            const alpha = Math.min(count / 40, 1);
            const cell = document.createElement('div');
            cell.className = 'heatmap-cell';
            cell.style.backgroundColor = count > 0 ? `rgba(26, 58, 90, ${0.1 + alpha})` : '#f0f0f0';
            cell.style.color = alpha > 0.5 ? 'white' : 'var(--azul)';
            cell.innerHTML = `<div><div class="mes-label">${m.slice(0,3)}</div>${count}</div>`;
            container.appendChild(cell);
        });
    }

    // --- 2. FICHA INTERACTIVA ---
    function mostrarFicha(name) {
        const info = globalData.mapOp[name];
        const ficha = document.getElementById('fichaOpera');
        ficha.style.display = 'block';
        ficha.innerHTML = `
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <h3 style="color:var(--oro); margin-top:0; font-style:italic;">${name}</h3>
                    <p><b>Representaciones:</b> ${info.funciones} noches registradas.</p>
                    <p><b>Años en cartel:</b> ${Array.from(info.años).sort().join(', ')}</p>
                </div>
                <div style="border-left: 1px solid rgba(255,255,255,0.2); padding-left:20px;">
                    <p><b>Principal Compositor:</b> ${info.equipo || 'No especificado'}</p>
                    <p><b>Ocasión recurrente:</b> ${Array.from(info.ocasiones).slice(0,2).join(', ')}</p>
                </div>
            </div>
        `;
    }

    function reRenderOperas(criterio) {
        const div = document.getElementById('listaOperas');
        document.getElementById('btn-alfa').classList.toggle('active', criterio === 'alfa');
        document.getElementById('btn-año').classList.toggle('active', criterio === 'año');
        let keys = Object.keys(globalData.mapOp);
        if (criterio === 'alfa') keys.sort();
        else keys.sort((a, b) => Math.min(...globalData.mapOp[a].años) - Math.min(...globalData.mapOp[b].años));
        
        div.innerHTML = "<ul>" + keys.map(k => `
            <li class="opera-item" onclick="mostrarFicha('${k}')">
                <span class="titulo-opera">${k}</span>
                <div>${Array.from(globalData.mapOp[k].años).sort().map(a => `<span class="tag-año">${a}</span>`).join('')}</div>
            </li>`).join('') + "</ul>";
    }

    function renderAutores(map, id) {
        document.getElementById(id).innerHTML = "<ul>" + Object.keys(map).sort().map(k => `
            <li style="font-size:0.85em; display:block; padding:10px 0;"><strong>${k}</strong><br>
            <small style="color:#666">Obras: ${Array.from(map[k]).map(t => `<i>${t}</i>`).join(', ')}</small></li>`).join('') + "</ul>";
    }

    function detectarMes(s) {
        if (!s) return null;
        const d = { "en.": "Enero", "feb.": "Febrero", "mar.": "Marzo", "ab.": "Abril", "may.": "Mayo", "jun.": "Junio", "jul.": "Julio", "ag.": "Agosto", "sep.": "Septiembre", "oct.": "Octubre", "nov.": "Noviembre", "dic.": "Diciembre" };
        for (let k in d) if (s.toLowerCase().includes(k)) return d[k];
        return null;
    }

    function renderCharts(d) {
        const añosArr = [...new Set(d.data.map(i => i.Año))].sort();
        const ctxAnual = document.getElementById('chartAnual').getContext('2d');
        
        new Chart(ctxAnual, {
            type: 'line',
            data: { 
                labels: añosArr, 
                datasets: [{ 
                    label: 'Funciones', 
                    data: añosArr.map(a => d.data.filter(i => i.Año === a).length), 
                    borderColor: '#1a3a5a', tension: 0.3, fill: true, backgroundColor: 'rgba(26,58,90,0.05)' 
                }] 
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: {
                    tooltip: {
                        callbacks: {
                            afterLabel: (context) => {
                                const año = context.label;
                                return HITOS[año] ? `✦ Hito: ${HITOS[año]}` : '';
                            }
                        }
                    }
                }
            }
        });

        new Chart(document.getElementById('chartMensual'), {
            type: 'radar',
            data: { 
                labels: MESES, 
                datasets: [{ data: MESES.map(m => d.data.filter(i => detectarMes(i.Día) === m).length), borderColor: '#b8860b', backgroundColor: 'rgba(184,134,11,0.1)' }] 
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }
</script>
</body>
</html>
