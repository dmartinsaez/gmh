<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio de Textos - Catálogo Farinelli</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --azul: #1a3a5a; --oro: #b8860b; --fondo: #fdfaf3; --borde: #dcdde1; }
        body { font-family: 'Georgia', serif; background-color: #f4f1ea; color: #2c3e50; line-height: 1.8; margin: 0; padding: 20px; }
        .contenedor { max-width: 1100px; margin: 0 auto; background: var(--fondo); padding: 30px; border-top: 6px solid var(--oro); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { text-align: center; font-size: 1.6em; color: var(--azul); text-transform: uppercase; border-bottom: 2px double var(--oro); padding-bottom: 10px; }

        .metricas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; text-align: center; max-width: 600px; margin-left: auto; margin-right: auto; }
        .metrica-card { background: white; padding: 20px; border: 1px solid var(--borde); border-radius: 8px; }
        .metrica-val { font-size: 2.2em; font-weight: bold; color: var(--azul); display: block; }
        .metrica-lab { font-size: 0.75em; text-transform: uppercase; color: var(--oro); font-weight: bold; letter-spacing: 1px; }

        .grid-graficas { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .card-grafica { background: white; padding: 20px; border: 1px solid var(--borde); border-radius: 8px; height: 420px; position: relative; }
        .full-width { grid-column: 1 / -1; }

        .word-cloud { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--borde); background: white; border-radius: 8px; }
        .word-item { padding: 3px 8px; color: #555; font-size: 14px; }

        .lista-textos { max-height: 600px; overflow-y: scroll; background: white; border: 1px solid var(--borde); border-radius: 8px; padding: 10px; }
        .texto-card { padding: 25px; border-bottom: 1px solid #f0f0f0; }
        .texto-meta { font-size: 0.85em; color: var(--oro); font-weight: bold; margin-bottom: 10px; display: block; }
        
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--oro); border-radius: 5px; border: 3px solid white; }
        ::-webkit-scrollbar-track { background: #f0f0f0; }
        @media (max-width: 900px) { .grid-graficas, .metricas-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="contenedor">
    <h1>Análisis Lexicográfico de las Crónicas</h1>

    <div class="metricas-grid">
        <div class="metrica-card"><span class="metrica-val" id="m-unicas">0</span><span class="metrica-lab">Palabras Únicas</span></div>
        <div class="metrica-card"><span class="metrica-val" id="m-total">0</span><span class="metrica-lab">Total Palabras</span></div>
    </div>

    <div class="grid-graficas">
        <div class="card-grafica"><canvas id="chartLineas"></canvas></div>
        <div class="card-grafica"><canvas id="chartBarras"></canvas></div>
        <div class="card-grafica full-width"><canvas id="chartHistograma"></canvas></div>
    </div>

    <div id="wordCloud" class="word-cloud"></div>

    <div id="listaTextos" class="lista-textos"></div>
</div>

<script>
    let rawTextos = []; 
    let vocabulario = {};
    let palabrasPorAño = {};
    let longitudes = [];

    const EXCLUIDAS = ["1","11","12","13","14","15","16","17","18","2","20","200","21","23","24","25","26","27","28","30","31","33","34","35","36","37","39","4","40","41","420","43","44","45","5","6","60","7","8","9","90","a","al","alguna","algunas","alguno","algunos","algún","ambos","ampleamos","ante","antes","aquel","aquellas","aquellos","aqui","arriba","atras","bajo","bastante","bien","cada","capilla","cierta","ciertas","ciertos","como","con","conseguimos","conseguir","consigo","consigue","consiguen","consigues","cual","cuando","cuya","cuyo","d","de","del","dentro","desde","donde","dos","e","el","ellas","ellos","empleais","emplean","emplear","empleas","empleo","en","encima","entonces","entre","era","eramos","eran","eras","eres","es","esta","estaba","estado","estais","estamos","estan","este","estoy","fin","fue","fueron","fui","fuimos","gueno","ha","hace","haceis","hacemos","hacen","hacer","haces","hago","han","haviendo","huvo","incluso","intenta","intentais","intentamos","intentan","intentar","intentas","intento","ir","la","largo","las","lo","los","m","mas","mayor","mientras","mio","misma","missa","modo","muchos","muy","nos","nosotros","o","otras","otro","para","pero","podeis","podemos","poder","podria","podriais","podriamos","podrian","podrias","por","por qué","porque","primero desde","puede","pueden","puedo","que","quien","s","sabe","sabeis","sabemos","saben","saber","sabes","se","ser","si","sic","siendo","sin","sobre","sois","solamente","solo","somos","soy","su","sus","tambien","también","teneis","tenemos","tener","tengo","tiempo","tiene","tienen","toda","todo","trabaja","trabajais","trabajamos","trabajan","trabajar","trabajas","trabajo","tras","tribuna","tuvo","tuyo","ultimo","un","una","unas","uno","unos","usa","usais","usamos","usan","usar","usas","uso","va","vais","valor","vamos","van","vaya","verdad","verdadera cierto","verdadero","vosotras","vosotros","voy","y","yo"];

    fetch('archivo.json').then(r => r.json()).then(data => {
        let vistos = new Set();
        rawTextos = data.filter(item => {
            if (!item.Transcripción || item.Transcripción.trim().length === 0) return false;
            if (vistos.has(item.Transcripción)) return false;
            vistos.add(item.Transcripción);
            return true;
        });

        procesarTextos();
        renderCharts();
        renderCloud();
        renderLista();
    });

    function procesarTextos() {
        let totalPalabras = 0;
        let setUnicas = new Set();
        vocabulario = {}; 
        palabrasPorAño = {};
        longitudes = [];

        rawTextos.forEach(item => {
            let textoSinHTML = item.Transcripción.replace(/<\/?[^>]+(>|$)/g, " ");
            let palabras = textoSinHTML.toLowerCase().match(/[a-záéíóúñ]{2,}/gi) || [];
            
            totalPalabras += palabras.length;
            longitudes.push(palabras.length); // Guardamos longitud para el histograma

            if (!palabrasPorAño[item.Año]) palabrasPorAño[item.Año] = 0;
            palabrasPorAño[item.Año] += palabras.length;

            palabras.forEach(p => {
                let pLimpia = p.trim();
                if (!EXCLUIDAS.includes(pLimpia) && pLimpia !== "colis") {
                    setUnicas.add(pLimpia);
                    vocabulario[pLimpia] = (vocabulario[pLimpia] || 0) + 1;
                }
            });
        });

        document.getElementById('m-unicas').innerText = setUnicas.size.toLocaleString();
        document.getElementById('m-total').innerText = totalPalabras.toLocaleString();
    }

    function renderCharts() {
        const años = Object.keys(palabrasPorAño).sort();
        
        // Gráfica 1: Volumen Anual
        new Chart(document.getElementById('chartLineas'), {
            type: 'line',
            data: { labels: años, datasets: [{ label: 'Palabras', data: años.map(a => palabrasPorAño[a]), borderColor: '#1a3a5a', tension: 0.4, fill: true, backgroundColor: 'rgba(26, 58, 90, 0.1)' }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: 'EVOLUCIÓN DEL VOLUMEN NARRATIVO' } } }
        });

        // Gráfica 2: Top 10 Palabras
        const top10 = Object.entries(vocabulario).sort((a,b) => b[1]-a[1]).slice(0, 10);
        new Chart(document.getElementById('chartBarras'), {
            type: 'bar',
            data: { labels: top10.map(t => t[0].toUpperCase()), datasets: [{ data: top10.map(t => t[1]), backgroundColor: '#b8860b' }] },
            options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, layout: { padding: { left: 120 } }, plugins: { legend: { display: false }, title: { display: true, text: 'PALABRAS MÁS UTILIZADAS' } } }
        });

        // Gráfica 3: Histograma de Extensión de Crónicas
        // Agrupamos por rangos (0-50 palabras, 50-100, etc.)
        let rangos = {"0-50":0, "51-100":0, "101-150":0, "151-200":0, "+200":0};
        longitudes.forEach(l => {
            if(l<=50) rangos["0-50"]++;
            else if(l<=100) rangos["51-100"]++;
            else if(l<=150) rangos["101-150"]++;
            else if(l<=200) rangos["151-200"]++;
            else rangos["+200"]++;
        });

        new Chart(document.getElementById('chartHistograma'), {
            type: 'bar',
            data: { 
                labels: Object.keys(rangos), 
                datasets: [{ label: 'Número de Crónicas', data: Object.values(rangos), backgroundColor: '#1a3a5a' }] 
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: 'EXTENSIÓN DE LAS CRÓNICAS (Palabras por texto)' } } }
        });
    }

    function renderCloud() {
        const cloud = document.getElementById('wordCloud');
        Object.entries(vocabulario).sort((a,b) => b[1]-a[1]).slice(0, 40).forEach(([w, f]) => {
            let s = document.createElement('span');
            s.className = 'word-item';
            s.innerText = w;
            cloud.appendChild(s);
            cloud.innerHTML += " • ";
        });
    }

    function renderLista() {
        const container = document.getElementById('listaTextos');
        rawTextos.forEach(item => {
            container.innerHTML += `<div class="texto-card"><span class="texto-meta">${item.Año} | ${item.Día}</span><div class="texto-contenido">${item.Transcripción}</div></div>`;
        });
    }
</script>
</body>
</html>
