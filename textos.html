<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio Lexicográfico - Catálogo Farinelli</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --azul: #1a3a5a; --oro: #b8860b; --fondo: #fdfaf3; --borde: #dcdde1; }
        body { font-family: 'Georgia', serif; background-color: #f4f1ea; color: #2c3e50; line-height: 1.8; margin: 0; padding: 20px; }
        .contenedor { max-width: 1200px; margin: 0 auto; background: var(--fondo); padding: 30px; border-top: 6px solid var(--oro); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { text-align: center; font-size: 1.6em; color: var(--azul); text-transform: uppercase; border-bottom: 2px double var(--oro); padding-bottom: 10px; margin-bottom: 30px; }

        .metricas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; text-align: center; max-width: 600px; margin-left: auto; margin-right: auto; }
        .metrica-card { background: white; padding: 15px; border: 1px solid var(--borde); border-radius: 8px; }
        .metrica-val { font-size: 2em; font-weight: bold; color: var(--azul); display: block; }
        .metrica-lab { font-size: 0.7em; text-transform: uppercase; color: var(--oro); font-weight: bold; letter-spacing: 1px; }

        .grid-graficas { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .card-grafica { background: white; padding: 20px; border: 1px solid var(--borde); border-radius: 8px; height: 450px; position: relative; }
        .full-width { grid-column: 1 / -1; }
        .info-analisis { font-size: 0.9em; color: #666; font-style: italic; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="contenedor">
    <h1>Análisis Cuantitativo y Cobertura Léxica</h1>

    <div class="metricas-grid">
        <div class="metrica-card"><span class="metrica-val" id="m-unicas">0</span><span class="metrica-lab">Formas Únicas (Netas)</span></div>
        <div class="metrica-card"><span class="metrica-val" id="m-total">0</span><span class="metrica-lab">Total Palabras (Netas)</span></div>
    </div>

    <div class="grid-graficas">
        <div class="card-grafica full-width"><canvas id="chartEvolucionComparada"></canvas></div>
        
        <div class="card-grafica full-width"><canvas id="chartCobertura"></canvas>
            <div class="info-analisis">Calculado sobre el vocabulario neto (sin palabras funcionales, gm o mh).</div>
        </div>
        
        <div class="card-grafica full-width"><canvas id="chartTop10"></canvas></div>
    </div>
</div>

<script>
    let rawTextos = []; 
    let vocabularioNeto = {};
    let palabrasBrutasPorAño = {};
    let palabrasNetasPorAño = {};
    let totalNetasGlobal = 0; // Necesario para la cobertura

    const EXCLUIDAS = ["gm","mh","1","11","12","13","14","15","16","17","18","2","20","200","21","23","24","25","26","27","28","30","31","33","34","35","36","37","39","4","40","41","420","43","44","45","5","6","60","7","8","9","90","a","al","alguna","algunas","alguno","algunos","algún","ambos","ampleamos","ante","antes","aquel","aquellas","aquellos","aqui","arriba","atras","bajo","bastante","bien","cada","capilla","cierta","ciertas","ciertos","como","con","conseguimos","conseguir","consigo","consigue","consiguen","consigues","cual","cuando","cuya","cuyo","d","de","del","dentro","desde","donde","dos","e","el","ellas","ellos","empleais","emplean","emplear","empleas","empleo","en","encima","entonces","entre","era","eramos","eran","eras","eres","es","esta","estaba","estado","estais","estamos","estan","este","estoy","fin","fue","fueron","fui","fuimos","gueno","ha","hace","haceis","hacemos","hacen","hacen","hacer","haces","hago","han","haviendo","huvo","incluso","intenta","intentais","intentamos","intentan","intentar","intentas","intento","ir","la","largo","las","lo","los","m","mas","mayor","mientras","mio","misma","missa","modo","muchos","muy","nos","nosotros","o","otras","otro","para","pero","podeis","podemos","poder","podria","podriais","podriamos","podrian","podrias","por","por qué","porque","primero desde","puede","pueden","puedo","que","quien","s","sabe","sabeis","sabemos","saben","saber","sabes","se","ser","si","sic","siendo","sin","sobre","sois","solamente","solo","somos","soy","su","sus","tambien","también","teneis","tenemos","tener","tengo","tiempo","tiene","tienen","toda","todo","trabaja","trabajais","trabajamos","trabajamos","trabajan","trabajar","trabajas","trabajo","tras","tribuna","tuvo","tuyo","ultimo","un","una","unas","uno","unos","usa","usais","usamos","usan","usar","usas","uso","va","vais","valor","vamos","van","vaya","verdad","verdadera cierto","verdadero","vosotras","vosotros","voy","y","yo"];

    fetch('archivo.json').then(r => r.json()).then(data => {
        let vistos = new Set();
        rawTextos = data.filter(item => {
            if (!item.Transcripción || item.Transcripción.trim().length === 0) return false;
            if (vistos.has(item.Transcripción)) return false;
            vistos.add(item.Transcripción);
            return true;
        });
        procesarDatos();
        renderCharts();
    });

    function procesarDatos() {
        let setUnicasNetas = new Set();
        totalNetasGlobal = 0; // Reiniciamos

        rawTextos.forEach(item => {
            let textoSinHTML = item.Transcripción.replace(/<\/?[^>]+(>|$)/g, " ");
            let palabras = textoSinHTML.toLowerCase().match(/[a-záéíóúñ]{2,}/gi) || [];
            
            if (!palabrasBrutasPorAño[item.Año]) palabrasBrutasPorAño[item.Año] = 0;
            if (!palabrasNetasPorAño[item.Año]) palabrasNetasPorAño[item.Año] = 0;

            palabras.forEach(p => {
                let pLimpia = p.trim();
                
                // Exclusión total de GM/MH en historial bruto
                if (pLimpia === "gm" || pLimpia === "mh") return;
                
                palabrasBrutasPorAño[item.Año]++;

                // Datos Netos (sin stop-words de tu lista)
                if (!EXCLUIDAS.includes(pLimpia)) {
                    setUnicasNetas.add(pLimpia);
                    vocabularioNeto[pLimpia] = (vocabularioNeto[pLimpia] || 0) + 1;
                    palabrasNetasPorAño[item.Año]++;
                    totalNetasGlobal++;
                }
            });
        });

        document.getElementById('m-unicas').innerText = setUnicasNetas.size.toLocaleString();
        document.getElementById('m-total').innerText = totalNetasGlobal.toLocaleString();
    }

    function renderCharts() {
        const años = Object.keys(palabrasBrutasPorAño).sort();

        // 1. Evolución Comparada
        new Chart(document.getElementById('chartEvolucionComparada'), {
            type: 'line',
            data: {
                labels: años,
                datasets: [
                    { label: 'Volumen Bruto (con funcionales, sin GM/MH)', data: años.map(a => palabrasBrutasPorAño[a]), borderColor: '#ccc', borderDash: [5, 5], pointRadius: 0, fill: false, tension: 0.3 },
                    { label: 'Volumen Neto (Investigación)', data: años.map(a => palabrasNetasPorAño[a]), borderColor: '#1a3a5a', backgroundColor: 'rgba(26,58,90,0.1)', fill: true, tension: 0.3 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: 'DINÁMICA DEL VOLUMEN NARRATIVO ANUAL' } } }
        });

        // 2. LÓGICA DE COBERTURA LÉXICA (Replicando tu gráfica)
        const sortedFrequencies = Object.values(vocabularioNeto).sort((a, b) => b - a);
        const top50Frequencies = sortedFrequencies.slice(0, 50);
        
        let cumulativeFrequency = 0;
        const cumulativeData = top50Frequencies.map((freq, index) => {
            cumulativeFrequency += freq;
            // Calculamos porcentaje sobre el total NETO global
            return { x: index + 1, y: (cumulativeFrequency / totalNetasGlobal) * 100 };
        });

        new Chart(document.getElementById('chartCobertura'), {
            type: 'line',
            data: {
                datasets: [
                    {
                        label: 'Cobertura acumulada del corpus',
                        data: cumulativeData,
                        borderColor: '#0000FF', // AZUL como en tu gráfica
                        backgroundColor: '#0000FF',
                        borderWidth: 2,
                        pointRadius: 4, // Puntos marcados
                        fill: false,
                        tension: 0 // Líneas rectas entre puntos
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        type: 'linear',
                        min: 0, max: 50, // Top 50 Lemas
                        ticks: { stepSize: 10, font: { family: 'Arial' } },
                        title: { display: true, text: 'Número de lemas agrupados más frecuentes (Rango)', font: { weight: 'bold' } },
                        grid: { borderDash: [5, 5] } // Rejilla discontinua
                    },
                    y: {
                        min: 0, max: 55, // Porcentaje 0-100 (ajustado a max 55 para rejilla)
                        ticks: { stepSize: 10, font: { family: 'Arial' } },
                        title: { display: true, text: 'Porcentaje del corpus cubierto (%)', font: { weight: 'bold' } },
                        grid: { borderDash: [5, 5] }
                    }
                },
                plugins: {
                    title: { display: true, text: 'Concentración léxica y dispersión (cobertura del corpus por lema)', font: { size: 14, weight: 'bold' } },
                    legend: { display: false },
                    // Lógica para la línea roja del 50%
                    annotation: {
                        annotations: {
                            line1: {
                                type: 'line', yMin: 50, yMax: 50,
                                borderColor: 'rgb(255, 99, 132)',
                                borderWidth: 2, borderDash: [6, 6],
                                label: { display: true, content: '50% Cobertura', position: 'end', backgroundColor: 'rgba(255,255,255,0.8)', color: '#000' }
                            }
                        }
                    }
                }
            },
            // Plugin para añadir línea de rejilla discontinua y anotación manual ( Chart.js v3+)
            plugins: [{
                id: 'zipf_grid_and_line',
                beforeDraw: (chart) => {
                    const ctx = chart.ctx;
                    const yScale = chart.scales.y;
                    const xScale = chart.scales.x;
                    if (!yScale || !xScale) return;

                    // Dibujamos la línea roja del 50% manual si no se carga el plugin de anotación
                    const y50 = yScale.getPixelForValue(50);
                    ctx.save();
                    ctx.beginPath();
                    ctx.lineWidth = 1.5;
                    ctx.strokeStyle = '#FF0000'; // ROJO
                    ctx.setLineDash([5, 5]); // Discontinua
                    ctx.moveTo(xScale.left, y50);
                    ctx.lineTo(xScale.right, y50);
                    ctx.stroke();
                    ctx.restore();
                }
            }]
        });

        // 3. Top 10 (Neto) - Cambiado a full width para que luzca más
        const top10 = Object.entries(vocabularioNeto).sort((a,b) => b[1]-a[1]).slice(0, 10);
        new Chart(document.getElementById('chartTop10'), {
            type: 'bar',
            data: {
                labels: top10.map(t => t[0].toUpperCase()),
                datasets: [{ data: top10.map(t => t[1]), backgroundColor: '#1a3a5a' }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false }, title: { display: true, text: 'TÉRMINOS SIGNIFICATIVOS MÁS FRECUENTES' } }
            }
        });
    }
</script>
</body>
</html>
