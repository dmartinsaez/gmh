<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio de Textos - Catálogo Farinelli</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --azul: #1a3a5a; --oro: #b8860b; --fondo: #fdfaf3; --borde: #dcdde1; }
        body { font-family: 'Georgia', serif; background-color: #f4f1ea; color: #2c3e50; line-height: 1.8; margin: 0; padding: 20px; }
        .contenedor { max-width: 1100px; margin: 0 auto; background: var(--fondo); padding: 30px; border-top: 6px solid var(--oro); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        h1 { text-align: center; font-size: 1.6em; color: var(--azul); text-transform: uppercase; border-bottom: 2px double var(--oro); padding-bottom: 10px; }
        .seccion-titulo { text-align: center; font-variant: small-caps; color: var(--oro); border-bottom: 1px solid var(--oro); margin: 30px 0 15px 0; padding-bottom: 5px; font-size: 1.2em; }

        /* Métricas */
        .metricas-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; text-align: center; }
        .metrica-card { background: white; padding: 20px; border: 1px solid var(--borde); border-radius: 8px; }
        .metrica-val { font-size: 1.8em; font-weight: bold; color: var(--azul); display: block; }
        .metrica-lab { font-size: 0.8em; text-transform: uppercase; color: var(--oro); letter-spacing: 1px; }

        /* Gráficas */
        .grid-graficas { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .card-grafica { background: white; padding: 15px; border: 1px solid var(--borde); border-radius: 8px; height: 350px; position: relative; }

        /* Buscador y Nube */
        .buscador-container { background: white; padding: 20px; border: 1px solid var(--borde); border-radius: 8px; text-align: center; margin-bottom: 30px; }
        #inputBusqueda { width: 70%; padding: 12px; border: 1px solid var(--oro); border-radius: 4px; font-size: 1em; outline: none; }
        .word-cloud { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 20px; margin-bottom: 20px; }
        .word-item { cursor: pointer; transition: 0.2s; padding: 2px 5px; }
        .word-item:hover { color: var(--oro) !important; font-weight: bold; }

        /* Resultados */
        .lista-textos { max-height: 600px; overflow-y: scroll; background: white; border: 1px solid var(--borde); border-radius: 8px; padding: 10px; }
        .texto-card { padding: 20px; border-bottom: 1px solid #eee; }
        .texto-meta { font-size: 0.8em; color: var(--oro); font-weight: bold; margin-bottom: 8px; display: block; }
        .resaltado { background: #ffe066; font-weight: bold; color: #000; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--oro); border-radius: 4px; }
        @media (max-width: 800px) { .grid-graficas, .metricas-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="contenedor">
    <h1>Análisis de Transcripciones (Gaceta de Madrid)</h1>

    <div class="metricas-grid">
        <div class="metrica-card"><span class="metrica-val" id="m-unicas">-</span><span class="metrica-lab">Palabras Únicas</span></div>
        <div class="metrica-card"><span class="metrica-val" id="m-total">-</span><span class="metrica-lab">Total Palabras</span></div>
        <div class="metrica-card"><span class="metrica-val" id="m-docs">-</span><span class="metrica-lab">Crónicas</span></div>
    </div>

    <div class="grid-graficas">
        <div class="card-grafica"><canvas id="chartLineas"></canvas></div>
        <div class="card-grafica"><canvas id="chartBarras"></canvas></div>
    </div>

    <h2 class="seccion-titulo">Conceptos más frecuentes</h2>
    <div id="wordCloud" class="word-cloud"></div>

    <div class="buscador-container">
        <input type="text" id="inputBusqueda" placeholder="Búsqueda filológica (J/G, V/B, X, tildes...)" onkeyup="filtrar()">
    </div>

    <div id="listaTextos" class="lista-textos"></div>
</div>

<script>
    let globalData = [];
    let vocabulario = {};
    let palabrasPorAño = {};
    const EXCLUIDAS = ["1","11","12","13","14","15","16","17","18","2","20","200","21","23","24","25","26","27","28","30","31","33","34","35","36","37","39","4","40","41","420","43","44","45","5","6","60","7","8","9","90","a","al","alguna","algunas","alguno","algunos","algún","ambos","ampleamos","ante","antes","aquel","aquellas","aquellos","aqui","arriba","atras","bajo","bastante","bien","cada","capilla","cierta","ciertas","ciertos","como","con","conseguimos","conseguir","consigo","consigue","consiguen","consigues","cual","cuando","cuya","cuyo","d","de","del","dentro","desde","donde","dos","e","el","ellas","ellos","empleais","emplean","emplear","empleas","empleo","en","encima","entonces","entre","era","eramos","eran","eras","eres","es","esta","estaba","estado","estais","estamos","estan","este","estoy","fin","fue","fueron","fui","fuimos","gueno","ha","hace","haceis","hacemos","hacen","hacer","haces","hago","han","haviendo","huvo","incluso","intenta","intentais","intentamos","intentan","intentar","intentas","intento","ir","la","largo","las","lo","los","m","mas","mayor","mientras","mio","misma","missa","modo","muchos","muy","nos","nosotros","o","otras","otro","para","pero","podeis","podemos","poder","podria","podriais","podriamos","podrian","podrias","por","por qué","porque","primero desde","puede","pueden","puedo","que","quien","s","sabe","sabeis","sabemos","saben","saber","sabes","se","ser","si","sic","siendo","sin","sobre","sois","solamente","solo","somos","soy","su","sus","tambien","también","teneis","tenemos","tener","tengo","tiempo","tiene","tienen","toda","todo","trabaja","trabajais","trabajamos","trabajan","trabajar","trabajas","trabajo","tras","tribuna","tuvo","tuyo","ultimo","un","una","unas","uno","unos","usa","usais","usamos","usan","usar","usas","uso","va","vais","valor","vamos","van","vaya","verdad","verdadera cierto","verdadero","vosotras","vosotros","voy","y","yo"];

    fetch('archivo.json').then(r => r.json()).then(data => {
        globalData = data.filter(i => i.Transcripción && i.Transcripción.length > 10);
        procesar();
        renderCharts();
        renderCloud();
        filtrar();
    });

    function normalizar(t) {
        if (!t) return "";
        return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "")
            .replace(/g(?=[eiéí])/g, "j").replace(/x/g, "j").replace(/y/g, "i").replace(/h/g, "").replace(/v/g, "b").replace(/ç/g, "z").trim();
    }

    function procesar() {
        let totalWords = 0;
        globalData.forEach(item => {
            // Limpieza de HTML y puntuación para el conteo
            let texto = item.Transcripción.replace(/<\/?[^>]+(>|$)/g, "").toLowerCase();
            let palabras = texto.match(/[a-záéíóúñ]{3,}/gi) || []; // Palabras de +3 letras
            
            if (!palabrasPorAño[item.Año]) palabrasPorAño[item.Año] = 0;
            palabrasPorAño[item.Año] += palabras.length;
            totalWords += palabras.length;

            palabras.forEach(p => {
                let limpia = p.replace(/[.,;()]/g, "");
                if (!EXCLUIDAS.includes(limpia)) {
                    vocabulario[limpia] = (vocabulario[limpia] || 0) + 1;
                }
            });
        });

        document.getElementById('m-unicas').innerText = Object.keys(vocabulario).length.toLocaleString();
        document.getElementById('m-total').innerText = totalWords.toLocaleString();
        document.getElementById('m-docs').innerText = globalData.length;
    }

    function renderCharts() {
        const años = Object.keys(palabrasPorAño).sort();
        new Chart(document.getElementById('chartLineas'), {
            type: 'line',
            data: { labels: años, datasets: [{ label: 'Palabras/Año', data: años.map(a => palabrasPorAño[a]), borderColor: '#1a3a5a', tension: 0.3, fill: true, backgroundColor: 'rgba(26,58,90,0.1)' }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: 'VOLUMEN DE TEXTO POR AÑO' } } }
        });

        const top10 = Object.entries(vocabulario).sort((a,b) => b[1]-a[1]).slice(0, 10);
        new Chart(document.getElementById('chartBarras'), {
            type: 'bar',
            data: { labels: top10.map(t => t[0].toUpperCase()), datasets: [{ label: 'Frecuencia', data: top10.map(t => t[1]), backgroundColor: '#b8860b' }] },
            options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: 'TOP 10 CONCEPTOS CLAVE' }, legend: {display:false} } }
        });
    }

    function renderCloud() {
        const cloud = document.getElementById('wordCloud');
        Object.entries(vocabulario).sort((a,b) => b[1]-a[1]).slice(0, 35).forEach(([w, f]) => {
            let s = document.createElement('span');
            s.className = 'word-item';
            s.innerText = w;
            s.style.fontSize = `${Math.min(12 + f * 1.5, 30)}px`;
            s.style.color = f > 10 ? 'var(--azul)' : '#999';
            s.onclick = () => { document.getElementById('inputBusqueda').value = w; filtrar(); };
            cloud.appendChild(s);
        });
    }

    function filtrar() {
        const query = document.getElementById('inputBusqueda').value;
        const qNorm = normalizar(query);
        const container = document.getElementById('listaTextos');
        container.innerHTML = "";

        globalData.forEach(item => {
            if (qNorm === "" || normalizar(item.Transcripción).includes(qNorm)) {
                let content = item.Transcripción;
                if (query.length > 2) {
                    let pattern = qNorm.split('').map(c => {
                        if (c === 'j') return '[j|g|x]';
                        if (c === 'i') return '[i|y]';
                        if (c === 'b') return '[b|v]';
                        return c;
                    }).join('[\\u0300-\\u036f]?h?');
                    content = content.replace(new RegExp(pattern, "gi"), m => `<span class="resaltado">${m}</span>`);
                }
                container.innerHTML += `<div class="texto-card"><span class="texto-meta">${item.Año} | ${item.Título.replace(/<\/?[^>]+(>|$)/g, "")}</span><div class="texto-contenido">${content}</div></div>`;
            }
        });
    }
</script>
</body>
</html>
